<html lang="en">
<head>

    <title>Tic-Tac-Toe-Game</title>

</head>
<body>
    <h1>Welcome to <span>Tic Tac Toe Game</span></h1>
    <h2>Enter Player Names to Start the Game</h2>
    <div class="playerox">

    <form>
    <input class="inputs" type="text" id="playerX" name="playerX" placeholder="Enter Player O name" required>

    <input class="inputs" type="text" id="playerO" name="playerO" placeholder="Enter Player X name" required>

    <input class="start" type="submit" value="Start Game">
  </form>
    </div>
